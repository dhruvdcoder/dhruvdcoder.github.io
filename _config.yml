# Website settings
title: Dpad
description: >- # this means to ignore newlines until "baseurl:"
  This is the personal website of Dhruvesh Patel.
#keywords: Jack,Jalpc,blog,Jekyll,github,gh-pages
#baseurl:  /Jalpc # if you have suburl as homepage like '/homepage', please change it to '/homepage' and your repo's name should be 'homepage'
#url: https://jarrekk.github.io/Jalpc  # url should be 'http://<github_username>.github.io/homepage' as before
# url: http://127.0.0.1:4000
baseurl:  ""
url: "https://dhruvdcoder.github.io"
#img_path: /Jalpc/static/assets/img/blog  # url should be '/homepage/static/assets/img/blog' as before
img_path: /assets
# author -- index page "about me" section
author:  # change following line to your infomation.
  name: Dhruvesh  # Be used at blog posts' author.
  first_name: Dhruvesh  # Be used at index page about me section.
  last_name: Patel  # Be used at index page about me section.
  avatar: /static/assets/img/landing/dp.jpg  # upload your avatar at directory and edit it.
  github_username: dhruvdcoder  # Leave blank if you don't have now
  linkedin_id: dhruveshp # Leave blank if you don't have now
  quora_id: Dhruvesh-Patel
  goodreads_username: dhruvdreader
  facebook_username: dhruvdplayer  # Leave blank if you don't have now
  twitter_username: dhruvdplayer  # Leave blank if you don't have now
  email: dhruvdplayer@gmail.com  # Leave blank if you don't have now
  cv: http://cv.jarrekk.com  # An online CV can be printed as PDF, leave blank if you don't have now
  # skill icons are on avatar's left and right side. Reference urls are http://fontawesome.io/ and http://fizzed.com/oss/font-mfizz
  skill_icon1:
    - name: fa-aws
    - name: fa-linux
  skill_icon2:
    - name: icon-cplusplus
    - name: icon-d3
    - name: icon-python
    - name: icon-git
  desc: I am a software engineer and this is my personal website.  I am an engineer at the core and I endeavour to find how things work. This is the place where you'd find facts about me, some of my ideas as posts and results of my random musings. I talk about all things that I find interesting; be it linux's elf binaries, machine learning, even Godel's incompleteness theorems. Feel free to look around. The page is being constantly improved and any suggestions are welcome. 

