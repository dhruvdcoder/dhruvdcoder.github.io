<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1 maximum-scale=1; minimum-scale=1; user-scalable=no;">
  <meta name="google-site-verification" content="mhYGvP4z9Y1XBNcoldg0TbnWfgOuPAZ77pCT2Jqyp9U" />
  {% if page.desc %}
    <meta content="{{ page.desc }}" name="description">
  {% endif %}
  {% if page.keywords %}
    <meta name="keywords" content="{{ page.keywords }}">
  {% endif %}
  <meta name="author" content="{{ site.author.name }}">
  <meta name="baseurl" content="{{ site.baseurl }}">

  <title>
    {% if page.title != "index" %}
        {{ site.title }}|{{ page.title }}
    {% else %}
        {{ site.title }}
    {% endif %}
  </title>
  <!-- favicon -->
  <link rel="shortcut icon" href="{{ site.url }}{{ site.baseurl }}{{ "/static/assets/img/favicon.ico" }}">

  <!-- Main CSS -->
  <link href="{{ "/static/assets/app-20180313.min.css" | prepend: site.baseurl }}" rel="stylesheet"> 
  <link href="{{ "/static/css/custom.css" | prepend: site.baseurl }}" rel="stylesheet">

  <!-- Main Scripts -->
  <script src="{{"/static/assets/app-20180313.min.js"| prepend: site.baseurl }}"></script>
  <script src="{{"/static/assets/blog-20180313.min.js"| prepend: site.baseurl }}"></script>
  <script src={{ "/static/js/coliru.js" | absolute_url }} type="text/javascript"></script>

  <!-- Latex using MathJack -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>

  <!-- Google AdSense -->
  <script async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-6196184620180313",
      enable_page_level_ads: true
    });
  </script>
  <!-- for AMP Validation -->
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <!--- Google Structured data -->
  <script type="application/ld+json">
  {
    "@context": "http://schema.org",
    "@type": "Website",
    "url": "https://www.dhruvdcoder.github.io",
    "name": "Dpad",
    "about" : {
		"@type": "Thing",
        "description": "Personal website of Dhruvesh Patel",
        "image": "{{ site.url }}{{ site.baseurl }}{{ "/static/assets/img/landing/dp.jpg" }}",
        "name": "Dhruvesh Patel"
    },
    "author": {
        "@type": "Person",
        "name": "Dhruvesh Patel",
        "additionalName": "Nikhilkumar",
        "alumniOf": {
            "@type": "EducationalOrganization",
            "name" : "Indian Institute Of Technology Madras",
            "url": "https://www.iitm.ac.in"
        },
        "contactPoint": {
            "@type": "ContactPoint",
            "email": "dhruvdplayer@gmail.com",
            "contactType": "Personal",
            "url": "https://dhruvdcoder.github.io"
        }
    }
  }
  </script>

</head>
