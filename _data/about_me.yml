about_me: "I have an eclectic background involving robotics,  software engineering, computer science, machine learning and natural language processing. 
<br><br>
Currently I am pursuing a master's degree in Computer Science at the <strong>University of Massachusetts Amherst </strong>focusing my coursework/projects on Machine Learning as applied to NLP and Knowledge Graphs. My current research interests lie in the intersection of geometry, deep learning and NLP. In particular, I am interested in exploiting the geometry of non-euclidean spaces to provide better inductive bias to the representation models of natural language and Knowledge Graphs. I worked as a Graduate Student Research Assistant at <a href=\"http://www.iesl.cs.umass.edu/people\"> <strong>Information Extraction and Synthesis Lab (IESL)</strong> </a>which is headed by <a href=\"https://people.cs.umass.edu/~mccallum/\">Prof. Andrew McCallum</a>.
<br><br>
Prior to starting my master's program, I worked in a small team at <a href=\"https://www.kenome.io/\"><strong>Kenome</strong></a> -- a nascent but extremely driven startup founded by <a href=\"http://talukdar.net/\">Prof. Partha Talukdar</a> -- solving challenging problems using Machine Learning and NLP. There I developed and deployed an RNN based time series prediction engine which utilizes structured time series data as well as unstructured textual data to make predictions about the time series. 
<br><br>
I have also worked for ~2 years as a software engineer at <a href=\"https://www.mathworks.com/\"><strong>MathWorks</strong></a>, focusing on developing Simulink and related products. This bolstered my knowledge of computer science and software development.
<br><br>
I started off my research career by working on computational aspects of robot kinematics and dynamics at the <a href=\"https://ed.iitm.ac.in/~robotics_lab/index.html\"<strong>Robotics Lab., IIT Madras</strong></a>. My master's thesis on computing the safe working zone of parallel robot manipulators resulted in a publication at an international conference.
<br><br><br><br>

<strong>Do click on the 'read more...' links and project icons below to know more about my work. To contact me use any of the social media links above.</strong>"