about_me: "I am a first year Computer Science PhD student at UMass Amherst working with <a href=\"https://people.cs.umass.edu/~mccallum/\">Prof. Andrew McCallum</a>.I have an eclectic academic background involving robotics, software engineering, machine learning and natural language processing. My current research focuses on Machine Learning as applied to Natural Language Processing (NLP) and Knowledge Graphs (KGs). I am broadly interested in (1) exploiting the geometry of non-euclidean spaces to provide better inductive bias to the representation models of natural language and Knowledge Graphs, and in (2) integrating external knowledge sources like Knowledge Graphs, ontologies and hierarchies with deep learning models using end-to-end gradient based learning to create <strong>explainable, instructable and data efficient learning machines</strong>.
<br>

Prior to starting my PhD, I was a master's student at UMass. During this time I worked as a research intern (2019) at <a href=\"http://www.iesl.cs.umass.edu/people\"> Information Extraction and Synthesis Lab (IESL) </a> and <a href=\"https://www.abridge.com/machine-learning\"> Abridge AI</a>. Prior to starting my master's program, I worked in a small team at <a href=\"https://www.kenome.io/\">Kenome </a>-- a nascent but extremely driven startup founded by <a href=\"http://talukdar.net/\">Prof. Partha Talukdar</a> -- solving challenging problems using Machine Learning and NLP. I have also worked for ~2 years as a software engineer at <a href=\"https://www.mathworks.com/\">MathWorks</a>, focusing on developing Simulink and related products. During my undergrad at <a href=\"https://www.iitm.ac.in/\">IIT Madras</a>, I worked with <a href=\"https://ed.iitm.ac.in/~sandipan/\">Prof. Bandyopadhyay</a> on problems in Robotics.
<br><br>
I am always on the lookout for interesting conversations and fruitful collaborations. Feel free to use the chat-box at the bottom or my email to get in touch."
