about_me: "I have an eclectic academic background involving robotics, software engineering, computer science, machine learning and natural language processing. Currently, I am pursuing a master's degree in Computer Science at the University of Massachusetts Amherst with focus on Machine Learning as applied to Natural Language Processing (NLP) and Knowledge Graphs (KGs). My current research interests lie in the intersection of geometry, deep learning and NLP. I am broadly interested in (1) exploiting the geometry of non-euclidean spaces to provide better inductive bias to the representation models of natural language and Knowledge Graphs, and in (2) integrating external knowledge sources like Knowledge Graphs, ontologies and hierarchies with deep learning models using end-to-end gradient based learning to create <strong>explainable, instructable and data efficient learning machines</strong>.
<br>
I was a summer research intern (2019) and continue to work as a Graduate Student Research Assistant at <a href=\"http://www.iesl.cs.umass.edu/people\"> Information Extraction and Synthesis Lab (IESL) </a> advised by <a href=\"https://people.cs.umass.edu/~mccallum/\">Prof. Andrew McCallum</a>. Prior to starting my master's program, I worked in a small team at <a href=\"https://www.kenome.io/\">Kenome </a>-- a nascent but extremely driven startup founded by <a href=\"http://talukdar.net/\">Prof. Partha Talukdar</a> -- solving challenging problems using Machine Learning and NLP. I have also worked for ~2 years as a software engineer at <a href=\"https://www.mathworks.com/\">MathWorks</a>, focusing on developing Simulink and related products.
<br><br>
Always on the lookout for interesting conversations and fruitful collaborations. Feel free to use the chat-box at the bottom or my email to get in touch."
