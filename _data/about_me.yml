about_me: "<p>I have an eclectic background involving ^500 robotics, ^500 software engineering, ^500 computer science, ^500 machine learning ^500 and natural language processing. ^1000\n
<br><br>
I started off by working on computational aspects of robot kinematics and dynamics at the <strong>Robotics Lab., IIT Madras</strong>. My master's thesis on computing the safe working zone of parallel robot manipulators resulted in a publication at an international conference. ^1000
<br><br>
I have worked as a software engineer at <strong>MathWorks</strong> focusing majorly on developing Simulink and related products. This bolstered my knowledge of computer science and software development. ^1000
<br><br>
Later, I worked in a small team at <strong>Kenome</strong> -- a nascent but extremely driven startup founded by Prof. Partha Talukdar -- solving challenging problems using Machine Learning and NLP. There I developed and deployed an RNN based time series prediction engine which utilizes structured time series data as well as unstructured textual data to make predictions about the time series. ^1000
<br><br>
Currently I am pursuing a master's degree in Computer Science at the <strong>University of Massachusetts Amherst </strong>focusing my coursework/projects on NLP and Machine Learning. My current research interests lie in the intersection of geometry, deep learning and NLP. In particular, I am interested in exploiting the geometry of non-euclidean spaces to provide correct inductive bias to the representation models of natural language. I work as a Graduate Student Research Assistant at <strong>Information Extraction and Synthesis Lab (IESL)</strong> which is headed by Prof. Andrew McCallum.
<br><br><br>
<strong>Do click on the 'read more...' links and project icons below to know more about my work. To contact me use any of the social media links above.</strong></p>"